rtabmap:
  ros__parameters:
    # Mode VIO sans GPS
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"
    publish_tf: true

    # Sources de données
    subscribe_depth: true
    subscribe_rgb: true
    subscribe_imu: true
    subscribe_odom_info: true

    # Fréquences
    Rtabmap/DetectionRate: "2"

    # Features visuels (mine = peu de texture)
    Vis/FeatureType: "6"
    Vis/MaxFeatures: "500"
    Vis/MinInliers: "15"

    # Loop closure
    Mem/STMSize: "30"
    Mem/RehearsalSimilarity: "0.45"

    # Optimisation graph
    Optimizer/Strategy: "1"
    Optimizer/Iterations: "20"

    # Fusion IMU
    Imu/Strategy: "1"
    Imu/GyroscopeNoise: "0.00017"
    Imu/AccelerometerNoise: "0.002"

    Reg/Force3DoF: "false"

    # Profondeur OAK-D Lite
    Grid/DepthMin: "0.3"
    Grid/DepthMax: "8.0"
    Grid/CellSize: "0.05"